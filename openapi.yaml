      required: [auditId, eventId, caseId, eventType, action, occurredAt, recordedAt, outcome, correlationId, schemaVersion, chainHash]
      properties:
        auditId:
          type: string
          format: uuid
          description: Legacy public audit identifier. Mirrors `eventId`.
        eventId:
          type: string
          format: uuid
          description: Typed event-kernel identifier. Currently equal to `auditId`.
        caseId:
          type: string
          format: uuid
        packetId:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            - case.created
            - case.shared
            - sample.registered
            - artifact.added
            - artifact.removed
            - study-context.attached
            - qc.recorded
            - document.ingested
            - fhir.imported
            - fhir.bundle.imported
            - packet.drafted
            - review.submitted
            - packet.finalized
            - case.deleted
        action:
          type: string
        occurredAt:
          type: string
          format: date-time
        recordedAt:
          type: string
          format: date-time
