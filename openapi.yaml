          type: string
          description: Optional workflow actor. Authenticated requests populate this from the bearer principal when a route does not supply a domain-specific actor; JWT-backed packet draft/review/finalize routes bind this to the authenticated `sub` rather than trusting request-body identities.
        outcome:
          type: string
          const: success
        correlationId:
          type: string
          description: Correlation identifier of the originating request or event chain.
        causationId:
          type: string
          description: Optional upstream event identifier for chained causality.
        schemaVersion:
          type: integer
          const: 1
        chainHash:
          type: string
          description: SHA-256 hash-chain value computed from the previous event hash plus the canonicalized current event.
        details:
          type: object
          additionalProperties: true
