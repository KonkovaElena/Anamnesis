openapi: 3.1.0
info:
  title: Anamnesis HTTP API
  version: 1.0.0
  summary: Narrow clinician-in-the-loop workflow API for case intake, bounded evidence ingestion, packet drafting, review, and audit.
  description: |
    The Anamnesis API is a narrow workflow surface for organizing intake, source artifacts,
    bounded text and FHIR import seams, physician packet drafts, explicit clinician review,
    packet finalization, and append-only audit history.

    This API is not a diagnosis, treatment, prescription, or general-purpose FHIR server API.

    Authentication model:
    - application endpoints expect `Authorization: Bearer <API_KEY>` when `API_KEY` is configured;
    - application endpoints also accept `Authorization: Bearer <JWT>` when `JWT_SECRET` or `JWT_PUBLIC_KEY` is configured;
    - `JWT_SECRET` and `JWT_PUBLIC_KEY` are mutually exclusive JWT verifier modes;
    - when `API_KEY` and one JWT verifier mode are configured, either bearer mechanism may be used;
    - JWTs must carry a non-empty `sub`, must satisfy configured `iss`/`aud` constraints, and may additionally be required to match a configured JOSE `typ` value;
    - `JWT_PUBLIC_KEY` enables RS256 verification and requires an RSA public key with modulus length >= 2048 bits;
    - unauthenticated startup is allowed only when `ALLOW_INSECURE_DEV_AUTH=true` is explicitly set;
    - the insecure development override is rejected when `NODE_ENV=production`.

    Interoperability boundary:
    - supported inline FHIR resource types: `Binary`, `DocumentReference`;
    - supported bundle types: `collection`, plus `document` when the bundle carries the standard document envelope for this slice (`Composition` first entry, `identifier.system`, `identifier.value`, and `timestamp`);
    - supported textual content: `text/plain`, `text/markdown`;
    - no CRUD/search/history/transaction `$operation` FHIR REST semantics are claimed here.
  contact:
    name: Anamnesis repository support
    url: https://github.com/KonkovaElena/Anamnesis/issues
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:4020
    description: Local standalone default
externalDocs:
  description: Claim boundary and API scope companion docs
  url: ./docs/api-scope.md
tags:
  - name: Cases
    description: Case creation, retrieval, listing, and deletion.
  - name: Artifacts
    description: Source artifact registration and removal.
  - name: Lineage
    description: Read-only evidence lineage graph retrieval for case artifacts.
  - name: Extraction
    description: Workflow enrichment for samples, imaging study context, and QC summaries.
  - name: Ingestion
    description: Text document ingestion into bounded source artifacts.
  - name: FHIR
    description: Narrow FHIR-compatible import seams.
  - name: Packets
    description: Physician packet draft and finalization workflow.
  - name: Reviews
    description: Explicit clinician review ledger.
  - name: Audit
    description: Append-only audit history by case.
  - name: Operations
    description: Aggregate operations summary and metrics.
  - name: Health
    description: Liveness and readiness probes.
security:
  - bearerAuth: []
  - jwtBearer: []
paths:
  /api/cases:
    post:
      tags: [Cases]
      summary: Create case
      operationId: createCase
      description: Create a case with structured intake and an optional workflow family. New cases start in `INTAKING`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
    get:
      tags: [Cases]
      summary: List cases
      operationId: listCases
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Cases listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    get:
      tags: [Cases]
      summary: Get case
      operationId: getCase
      responses:
        '200':
          description: Case retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
    delete:
      tags: [Cases]
      summary: Delete case
      operationId: deleteCase
      description: Delete a case and append a `case.deleted` audit event.
      responses:
        '204':
          description: Case deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/access-grants:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Cases]
      summary: Grant case access
      operationId: grantCaseAccess
      description: Add another JWT principal to the case access list. Allowed to the JWT case owner or an API-key operator only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantCaseAccessRequest'
      responses:
        '200':
          description: Case access granted and updated case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/evidence-lineage:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    get:
      tags: [Lineage]
      summary: Get evidence lineage graph
      operationId: getEvidenceLineage
      description: Return a read-only producer-to-consumer artifact graph plus artifact summary metadata for one case.
      responses:
        '200':
          description: Evidence lineage graph returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceLineageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/artifacts:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Artifacts]
      summary: Add source artifact
      operationId: addArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddArtifactRequest'
      responses:
        '201':
          description: Artifact added and case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/artifacts/{artifactId}:
    parameters:
      - $ref: '#/components/parameters/CaseId'
      - $ref: '#/components/parameters/ArtifactId'
    delete:
      tags: [Artifacts]
      summary: Remove source artifact
      operationId: removeArtifact
      responses:
        '200':
          description: Artifact removed and case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/samples:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Extraction]
      summary: Register sample
      operationId: registerSample
      description: Register a case-scoped molecular sample for downstream review workflows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSampleRequest'
      responses:
        '201':
          description: Sample registered and case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/study-context:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Extraction]
      summary: Attach study context
      operationId: attachStudyContext
      description: Attach imaging study metadata and initialize pending QC state for case-scoped review workflows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachStudyContextRequest'
      responses:
        '200':
          description: Study context attached and case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/qc-summary:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Extraction]
      summary: Record QC summary
      operationId: recordQcSummary
      description: Record a QC disposition and optional QC detail for an attached imaging study context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordQcSummaryRequest'
      responses:
        '200':
          description: QC summary recorded and case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/document-ingestions:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Ingestion]
      summary: Ingest bounded text document
      operationId: ingestDocument
      description: |
        Normalize a bounded `text/plain` or `text/markdown` payload into a source artifact.
        Request body parsing is bounded at the HTTP layer and the domain stores only a bounded excerpt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentIngestionRequest'
      responses:
        '201':
          description: Document ingested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentIngestionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/fhir-imports:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [FHIR]
      summary: Import one supported inline FHIR resource
      operationId: importFhirResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FhirImportRequest'
      responses:
        '201':
          description: FHIR resource imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirImportResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/fhir-bundle-imports:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [FHIR]
      summary: Import supported FHIR bundle entries
      operationId: importFhirBundle
      description: |
        Import a `document` or `collection` bundle containing supported `Binary` and `DocumentReference`
        entries. `document` bundles must include a `Composition` first entry plus `identifier.system`,
        `identifier.value`, and `timestamp`. External attachment fetch remains opt-in and heavily bounded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FhirBundleImportRequest'
      responses:
        '201':
          description: FHIR bundle imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FhirBundleImportResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/physician-packets:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      tags: [Packets]
      summary: Draft physician packet
      operationId: createPhysicianPacket
      description: |
        Draft a physician packet from current case state. Under JWT bearer auth, `requestedBy` is bound to the
        authenticated JWT `sub` and mismatched caller-supplied identities are rejected. At least one artifact must
        already exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePacketRequest'
      responses:
        '201':
          description: Packet drafted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhysicianPacketCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
    get:
      tags: [Packets]
      summary: List physician packets
      operationId: listPhysicianPackets
      responses:
        '200':
          description: Packets listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhysicianPacketListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/physician-packets/{packetId}/reviews:
    parameters:
      - $ref: '#/components/parameters/CaseId'
      - $ref: '#/components/parameters/PacketId'
    post:
      tags: [Reviews]
      summary: Submit clinician review
      operationId: submitReview
      description: |
        Append a review entry. When JWT bearer auth is used, `reviewerName` is bound to the authenticated JWT `sub`
        and the principal must carry either the `reviewer` or `clinician` role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReviewRequest'
      responses:
        '201':
          description: Review appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
    get:
      tags: [Reviews]
      summary: Get review ledger
      description: |
        Finalize a clinician-approved packet that is not stale. When JWT bearer auth is used, `finalizedBy` is bound
        to the authenticated JWT `sub` and the principal must carry the `clinician` role.
      responses:
        '200':
          description: Review ledger returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/physician-packets/{packetId}/finalize:
    parameters:
      - $ref: '#/components/parameters/CaseId'
      - $ref: '#/components/parameters/PacketId'
    post:
      tags: [Packets]
      summary: Finalize physician packet
      operationId: finalizePhysicianPacket
      description: Finalize a clinician-approved packet that is not stale.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizePacketRequest'
      responses:
        '200':
          description: Packet finalized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhysicianPacketCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/cases/{caseId}/audit-events:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    get:
      tags: [Audit]
      summary: List audit events by case id
      operationId: listAuditEventsByCase
      description: |
        Return append-only audit history by `caseId`. This endpoint is keyed to the audit store and may still
        return events after the case itself has been deleted.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Audit events returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/audit-chain/verify:
    get:
      tags: [Audit]
      summary: Verify audit hash chain for one case
      operationId: verifyAuditChainByCase
      description: |
        Recompute and verify the SHA-256 audit hash chain for all events returned by one `caseId`.
        This is a read-only tamper-evidence check and does not mutate stored events.
      parameters:
        - name: caseId
          in: query
          required: true
          description: Case identifier whose append-only audit chain should be verified.
          schema:
            type: string
      responses:
        '200':
          description: Audit chain verification result returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditChainVerificationResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse400'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /api/operations/summary:
    get:
      tags: [Operations]
      summary: Get operations summary
      operationId: getOperationsSummary
      responses:
        '200':
          description: Operations summary returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationsSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: healthz
      security: []
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: readyz
      security: []
      responses:
        '200':
          description: Process is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Process is shutting down and is no longer ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShuttingDownResponse'
  /metrics:
    get:
      tags: [Operations]
      summary: Prometheus-style metrics
      operationId: metrics
      security: []
      responses:
        '200':
          description: Plain-text metrics surface.
          content:
            text/plain:
              schema:
                type: string
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque API key
    jwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token validated via HS256 when `JWT_SECRET` is configured or via RS256 when `JWT_PUBLIC_KEY` is configured. Runtime validation enforces signature, `exp`, `iat`, `nbf`, non-empty `sub`, configured `iss`/`aud`, optional JOSE `typ`, and an RSA-2048 minimum for RS256 verification keys.
  parameters:
    CaseId:
      name: caseId
      in: path
      required: true
      description: Case UUID.
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifactId
      in: path
      required: true
      description: Artifact UUID.
      schema:
        type: string
        format: uuid
    PacketId:
      name: packetId
      in: path
      required: true
      description: Physician packet UUID.
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1-1000, default 100).
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    Offset:
      name: offset
      in: query
      required: false
      description: Number of items to skip (default 0).
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequestError:
      description: Request validation or request-governance error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ValidationErrorResponse'
              - $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    UnauthorizedError:
      description: Missing or invalid bearer token.
      headers:
        WWW-Authenticate:
          description: Bearer authentication challenge.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Authenticated principal is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Workflow or domain conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse400:
      description: Domain or parsing error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequestsError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DateOnly:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}$'
      examples: ['2026-04-03']
    CaseStatus:
      type: string
      enum: [INTAKING, READY_FOR_PACKET, REVIEW_REQUIRED]
    WorkflowFamily:
      type: string
      enum: [GENERAL_INTAKE, MRI_SECOND_OPINION, MRNA_BOARD_REVIEW]
    ArtifactType:
      type: string
      enum: [note, lab, summary, report, imaging-summary]
    ArtifactClass:
      type: string
      enum: [SOURCE, DERIVED, REVIEW_PACKET, HANDOFF_PACKET]
    SourceArtifactSemanticType:
      type: string
      enum:
