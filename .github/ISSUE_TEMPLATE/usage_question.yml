name: Usage question
description: Ask for help using or evaluating the repository.
title: "[Question]: "
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the workflow or evaluation goal.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you checked already?
      description: Mention relevant README or docs sections you already read.
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true