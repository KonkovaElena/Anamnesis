name: Bug report
description: Report a reproducible defect in Anamnesis.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Do not use this form for security vulnerabilities. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, branch, or commit is affected?
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 24.11.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Start the server with ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or payload excerpts
      description: Redact private, health-related, or security-sensitive information before posting.
      render: shell
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I removed private or health-related information from the report.
          required: true
        - label: I read the current README and scope docs before filing this issue.
          required: true